<!DOCTYPE html>
<html>
<head>
<title>Amir-gamer 🚗</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1{
 color:#00ff88;
}

#game{
 width:300px;
 height:500px;
 background:#333;
 margin:auto;
 position:relative;
 overflow:hidden;
 border:3px solid #00ff88;
}

#car{
 width:50px;
 height:80px;
 background:red;
 position:absolute;
 bottom:20px;
 left:125px;
 border-radius:10px;
}

.enemy{
 width:50px;
 height:80px;
 background:yellow;
 position:absolute;
 top:-100px;
 border-radius:10px;
}

button{
 margin:10px;
 padding:15px;
 background:#00ff88;
 border:0;
 border-radius:10px;
 font-size:20px;
}
</style>

</head>

<body>

<h1>Amir-gamer 🚗</h1>

<div id="game">
<div id="car"></div>
</div>

<h2 id="score">امتیاز: 0</h2>

<button onclick="left()">⬅️</button>
<button onclick="right()">➡️</button>


<script>

let car=document.getElementById("car");
let game=document.getElementById("game");
let scoreText=document.getElementById("score");

let x=125;
let score=0;


function left(){
 if(x>0){
 x-=25;
 car.style.left=x+"px";
 }
}


function right(){
 if(x<250){
 x+=25;
 car.style.left=x+"px";
 }
}


function enemy(){

let e=document.createElement("div");
e.className="enemy";

e.style.left=Math.floor(Math.random()*6)*50+"px";

game.appendChild(e);

let y=-100;

let move=setInterval(()=>{

y+=5;
e.style.top=y+"px";


if(y>500){
 e.remove();
 clearInterval(move);
 score++;
 scoreText.innerHTML="امتیاز: "+score;
}


let a=car.getBoundingClientRect();
let b=e.getBoundingClientRect();


if(
a.left<b.right &&
a.right>b.left &&
a.top<b.bottom &&
a.bottom>b.top
){
alert("باختی 😅 امتیاز: "+score);
location.reload();
}


},20);

}


setInterval(enemy,1500);


document.addEventListener("keydown",e=>{

if(e.key=="ArrowLeft") left();

if(e.key=="ArrowRight") right();

});


</script>

</body>
</html>
